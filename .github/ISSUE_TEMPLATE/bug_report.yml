name: Bug report
description: Report a reproducible problem in VibeAudit
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps, commands, inputs, or URLs.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js version, npm version, Docker version, and relevant services.
      placeholder: |
        OS:
        Browser:
        Node:
        npm:
        Docker:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs, stack traces, or screenshots. Remove secrets first.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed secrets and private data from logs/screenshots.
          required: true
